name = "mp3-musica"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "./build"

[[d1_databases]]
binding = "DB"
database_name = "mp3-musica"
database_id = "your-database-id-here"

[[kv_namespaces]]
binding = "KV"
id = "your-kv-id-here"

[[r2_buckets]]
binding = "R2"
bucket_name = "mp3-musica-media"

[[kv_namespaces]]
binding = "SESSION"
id = "your-session-kv-id-here"

[vars]
ENVIRONMENT = "production"

[secrets]
GOOGLE_CLIENT_ID = "your-google-client-id"
GOOGLE_CLIENT_SECRET = "your-google-client-secret"
GOOGLE_REDIRECT_URI = "https://mp3-musica.com/admin/oauth/callback"
